name: Run Scraper
on:
  schedule:
    - cron: '0 */3 * * *' # هر ۳ ساعت اجرا
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # ارتقا به نسخه 4
      - name: Set up Python
        uses: actions/setup-python@v5  # ارتقا به نسخه 5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install telethon
      - name: Run Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          TARGET_CHANNEL: ${{ secrets.TARGET_CHANNEL }}
        run: python bot.py
